<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>
  
  <!-- Black half -->
  <path d="M 100 0 A 100 100 0 0 1 100 200 A 50 50 0 0 1 100 100 A 50 50 0 0 0 100 0" fill="#000000"/>
  
  <!-- White half -->
  <path d="M 100 0 A 50 50 0 0 0 100 100 A 50 50 0 0 0 100 200 A 100 100 0 0 0 100 0" fill="#FFFFFF"/>
  
  <!-- Black dot in white half -->
  <circle cx="100" cy="50" r="15" fill="#000000"/>
  
  <!-- White dot in black half -->
  <circle cx="100" cy="150" r="15" fill="#FFFFFF"/>
</svg>